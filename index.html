<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spanish Vocabulary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f7f4;
      min-height: 100vh;
      color: #1a1a2e;
    }

    .container { max-width: 600px; margin: 0 auto; padding: 24px 16px 48px; }

    h1 { color: #2d6a4f; font-size: 2rem; margin-bottom: 4px; }
    h2 { color: #2d6a4f; font-size: 1.05rem; font-weight: 600; margin: 24px 0 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .subtitle { color: #666; margin-bottom: 8px; }

    /* Sections */
    .select-btns { display: flex; gap: 8px; margin-bottom: 10px; }
    .section-list { display: flex; flex-direction: column; gap: 6px; }
    .section-item {
      display: flex; align-items: center;
      background: #fff; border: 1px solid #d8ece4; border-radius: 8px;
      padding: 10px 14px; cursor: pointer; transition: border-color 0.15s;
    }
    .section-item:hover { border-color: #52b788; }
    .section-item input[type=checkbox] {
      width: 18px; height: 18px; margin-right: 12px;
      accent-color: #2d6a4f; cursor: pointer; flex-shrink: 0;
    }
    .section-name { flex: 1; font-weight: 500; }
    .section-count { color: #999; font-size: 0.85em; }

    /* Direction toggle */
    .direction-toggle {
      display: flex; background: #e0f0e8; border-radius: 8px; padding: 4px; gap: 4px;
    }
    .direction-toggle button {
      flex: 1; padding: 9px 8px; border: none; border-radius: 6px;
      background: transparent; cursor: pointer; font-size: 0.9rem; color: #555;
      transition: all 0.15s;
    }
    .direction-toggle button.active { background: #2d6a4f; color: #fff; font-weight: 600; }

    /* Activity grid */
    .activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .activity-btn {
      padding: 16px 12px; border: 2px solid #d8ece4; border-radius: 10px;
      background: #fff; cursor: pointer; font-size: 0.95rem; font-weight: 500;
      color: #2d6a4f; transition: all 0.15s; position: relative; text-align: center;
    }
    .activity-btn:hover:not(:disabled) { border-color: #2d6a4f; background: #f0f7f4; }
    .activity-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .soon-badge {
      position: absolute; top: 6px; right: 6px; font-size: 0.62rem;
      background: #f4a261; color: #fff; padding: 2px 5px; border-radius: 4px; font-weight: 700;
    }

    /* Omakase */
    .divider {
      text-align: center; color: #aaa; font-size: 0.85rem; margin: 16px 0;
      display: flex; align-items: center; gap: 10px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #cde8d8; }
    .omakase-btn {
      width: 100%; padding: 20px; background: linear-gradient(135deg, #1b4332, #2d6a4f);
      color: #fff; border: none; border-radius: 12px; font-size: 1.1rem;
      font-weight: 700; cursor: pointer; transition: opacity 0.15s;
    }
    .omakase-btn:hover { opacity: 0.88; }

    /* Generic buttons */
    .btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.82; }
    .btn-ghost { background: transparent; border: 1px solid #bbb; color: #555; }
    .btn-primary { background: #2d6a4f; color: #fff; }
    .btn-sm { padding: 6px 14px; font-size: 0.85rem; }
    .btn-full { width: 100%; }

    /* Quiz header */
    .quiz-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
    }
    .progress-text { color: #666; font-size: 0.9rem; }
    .progress-bar { height: 6px; background: #cde8d8; border-radius: 3px; margin-bottom: 28px; }
    .progress-fill { height: 100%; background: #52b788; border-radius: 3px; transition: width 0.3s; }

    /* Question */
    .prompt-label { color: #888; font-size: 0.85rem; margin-bottom: 8px; text-align: center; }
    .prompt-word {
      font-size: 2.2rem; font-weight: 700; color: #1a1a2e;
      margin-bottom: 32px; text-align: center; line-height: 1.2;
    }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .option-btn {
      padding: 14px 18px; border: 2px solid #d8ece4; border-radius: 10px;
      background: #fff; cursor: pointer; font-size: 1rem;
      text-align: left; transition: all 0.15s; color: #1a1a2e; width: 100%;
    }
    .option-btn:hover:not(:disabled) { border-color: #52b788; background: #f0f7f4; }
    .option-btn.correct  { border-color: #40916c; background: #d8f3dc; color: #1b4332; font-weight: 600; }
    .option-btn.incorrect{ border-color: #e63946; background: #ffe0e3; color: #7b1c24; }
    .option-btn:disabled { cursor: default; }

    .feedback {
      text-align: center; font-weight: 600; font-size: 1rem;
      margin-bottom: 20px; min-height: 26px;
    }
    .feedback.correct   { color: #40916c; }
    .feedback.incorrect { color: #e63946; }

    /* Score screen */
    .score-display { text-align: center; padding: 32px 0 20px; }
    .score-number { font-size: 4.5rem; font-weight: 800; color: #2d6a4f; line-height: 1; }
    .score-label { color: #555; font-size: 1.05rem; margin-top: 8px; }

    .review-heading { color: #2d6a4f; font-size: 1rem; font-weight: 600; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .wrong-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .wrong-item {
      background: #fff; border: 1px solid #ffd6d6; border-radius: 8px;
      padding: 10px 14px; font-size: 0.92rem;
    }
    .wrong-item .es { font-weight: 700; color: #c0392b; }
    .wrong-item .en { color: #444; }
    .wrong-item .yours { color: #999; font-style: italic; font-size: 0.83em; margin-top: 2px; display: block; }

    .score-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }

    /* Home two-column layout */
    .home-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 28px;
      align-items: start;
    }
    .home-left  { grid-column: 1; }
    .home-right { grid-column: 2; }
    @media (max-width: 520px) {
      .home-layout { grid-template-columns: 1fr; }
      .home-right  { grid-column: 1; }
    }

    /* Flashcards */
    .fc-hint { text-align: center; color: #aaa; font-size: 0.85rem; margin-bottom: 16px; min-height: 20px; }
    .card-wrap { perspective: 1200px; margin-bottom: 28px; cursor: pointer; }
    .card {
      width: 100%; min-height: 220px; position: relative;
      transform-style: preserve-3d; transition: transform 0.45s ease;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0; backface-visibility: hidden;
      background: #fff; border: 2px solid #d8ece4; border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 28px 24px; gap: 12px;
    }
    .card-face.back { transform: rotateY(180deg); border-color: #52b788; }
    .card-word { font-size: 2rem; font-weight: 700; text-align: center; line-height: 1.2; }
    .card-label { font-size: 0.8rem; color: #999; text-transform: uppercase; letter-spacing: 0.08em; }
    .speak-btn {
      margin-top: 8px; background: #e8f5ef; border: none; border-radius: 50%;
      width: 44px; height: 44px; font-size: 1.2rem; cursor: pointer;
      transition: background 0.15s; display: flex; align-items: center; justify-content: center;
    }
    .speak-btn:hover { background: #cde8d8; }
    .fc-nav {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .fc-nav .btn { flex: 1; }
    .fc-counter { color: #666; font-size: 0.9rem; white-space: nowrap; }

    /* Type Answer */
    .type-input {
      width: 100%; padding: 14px 16px; font-size: 1.1rem;
      border: 2px solid #d8ece4; border-radius: 10px; outline: none;
      transition: border-color 0.15s; background: #fff; color: #1a1a2e;
      margin-bottom: 14px;
    }
    .type-input:focus { border-color: #52b788; }
    .type-input.correct  { border-color: #40916c; background: #d8f3dc; }
    .type-input.nearly   { border-color: #f4a261; background: #fff3e8; }
    .type-input.incorrect{ border-color: #e63946; background: #ffe0e3; }
    .feedback.nearly { color: #d4732a; }
    .submit-row { display: flex; gap: 10px; margin-bottom: 20px; }
    .submit-row .btn { flex: 1; padding: 13px; font-size: 1rem; }
    .correct-answer { text-align: center; color: #555; font-size: 0.95rem; min-height: 22px; margin-bottom: 16px; }
    .correct-answer strong { color: #2d6a4f; }

    /* Dictation */
    .dict-speaker-area { text-align: center; margin: 24px 0 28px; }
    .dict-speak-btn {
      width: 84px; height: 84px; border-radius: 50%; border: none;
      background: #2d6a4f; color: #fff; font-size: 2.2rem; cursor: pointer;
      transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(45,106,79,0.35);
    }
    .dict-speak-btn:hover  { background: #1b4332; transform: scale(1.06); }
    .dict-speak-btn:active { transform: scale(0.94); }
    .dict-voice-label { color: #888; font-size: 0.8rem; margin-top: 10px; font-style: italic; min-height: 18px; }
    .dict-hint { color: #bbb; font-size: 0.78rem; margin-top: 3px; }

    .dict-layout { display: flex; gap: 32px; align-items: flex-start; margin: 20px 0; }
    .dict-side { flex: 0 0 100px; text-align: center; }
    .dict-main { flex: 1; }
    @media (max-width: 520px) {
      .dict-layout { flex-direction: column; align-items: center; gap: 16px; }
      .dict-side { flex: 0 0 auto; }
      .dict-main { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ── HOME SCREEN ─────────────────────────────────────────────── -->
  <div id="home-screen">
    <h1>¡Bienvenidos!</h1>
    <p class="subtitle">Practise your Spanish vocabulary.</p>

    <div class="home-layout">
      <!-- Left: topic selection -->
      <div class="home-left">
        <h2>Topics</h2>
        <div class="select-btns">
          <button class="btn btn-ghost btn-sm" onclick="selectAll(true)">Select all</button>
          <button class="btn btn-ghost btn-sm" onclick="selectAll(false)">Deselect all</button>
        </div>
        <div class="section-list" id="section-list"></div>
      </div>

      <!-- Right: direction + activity + random -->
      <div class="home-right">
        <h2>Direction</h2>
        <div class="direction-toggle">
          <button id="dir-es-en" class="active" onclick="setDirection('es-en')">Spanish → English</button>
          <button id="dir-en-es"               onclick="setDirection('en-es')">English → Spanish</button>
        </div>

        <h2>Activity</h2>
        <div class="activity-grid">
          <button class="activity-btn" onclick="startActivity('mc')">📋 Multiple Choice</button>
          <button class="activity-btn" onclick="startFlashcards()">🃏 Flashcards</button>
          <button class="activity-btn" onclick="startActivity('type')">✍️ Type Answer</button>
          <button class="activity-btn" onclick="startActivity('dict')">🔊 Dictation — Spell</button>
          <button class="activity-btn" onclick="startActivity('dict-choice')">🔊 Dictation + Choose</button>
          <button class="activity-btn" onclick="startActivity('dict-type')">🔊 Dictation + Type</button>
        </div>

        <div class="divider">or</div>
        <button class="omakase-btn" onclick="startOmakase()">Just pick for me!</button>
      </div>
    </div>
  </div>

  <!-- ── FLASHCARD SCREEN ──────────────────────────────────────── -->
  <div id="flashcard-screen" hidden>
    <div class="quiz-header">
      <button class="btn btn-ghost btn-sm" onclick="goHome()">← Back</button>
      <span class="progress-text" id="fc-progress"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="fc-progress-fill"></div></div>

    <p class="fc-hint" id="fc-hint">Tap the card to reveal</p>

    <div class="card-wrap" onclick="flipCard()">
      <div class="card" id="fc-card">
        <div class="card-face front">
          <span class="card-label" id="fc-front-label"></span>
          <span class="card-word"  id="fc-front-word"></span>
        </div>
        <div class="card-face back">
          <span class="card-label" id="fc-back-label"></span>
          <span class="card-word"  id="fc-back-word"></span>
          <button class="speak-btn" onclick="fcSpeak(event)" title="Hear it">🔊</button>
        </div>
      </div>
    </div>

    <div class="fc-nav">
      <button class="btn btn-ghost" id="fc-prev-btn" onclick="fcNav(-1)">← Prev</button>
      <span class="fc-counter" id="fc-counter"></span>
      <button class="btn btn-primary" id="fc-next-btn" onclick="fcNav(1)">Next →</button>
    </div>
  </div>

  <!-- ── TYPE ANSWER SCREEN ───────────────────────────────────────── -->
  <div id="type-screen" hidden>
    <div class="quiz-header">
      <button class="btn btn-ghost btn-sm" onclick="goHome()">← Back</button>
      <span class="progress-text" id="type-progress"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="type-progress-fill"></div></div>

    <p class="prompt-label" id="type-label"></p>
    <p class="prompt-word"  id="type-word"></p>

    <input id="type-input" class="type-input" type="text" placeholder="Type your answer…"
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="submit-row">
      <button id="type-skip-back-btn" class="btn btn-ghost"   onclick="handleSkipBack()">Skip</button>
      <button id="type-check-next-btn" class="btn btn-primary" onclick="handleCheckNext()">Check →</button>
    </div>
    <p class="feedback"      id="type-feedback"></p>
    <p class="correct-answer" id="type-correct"></p>
  </div>

  <!-- ── DICTATION SCREEN ─────────────────────────────────────── -->
  <div id="dict-screen" hidden>
    <div class="quiz-header">
      <button class="btn btn-ghost btn-sm" onclick="goHome()">← Back</button>
      <span class="progress-text" id="dict-progress"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="dict-progress-fill"></div></div>

    <div class="dict-layout">
      <div class="dict-side">
        <div class="dict-speaker-area" style="margin: 0;">
          <button class="dict-speak-btn" onclick="replayDictation()">🔊</button>
          <p class="dict-voice-label" id="dict-voice-label"></p>
          <p class="dict-hint">Tap to hear again</p>
        </div>
      </div>

      <div class="dict-main">
        <p class="prompt-label" style="text-align: left;">Type the Spanish word you heard</p>
        <input id="dict-input" class="type-input" type="text" placeholder="Escribe aquí…"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
               onkeydown="if(event.key==='Enter') handleCheckNext()">

        <p class="feedback"       id="dict-feedback" style="text-align: left;"></p>
        <p class="correct-answer" id="dict-correct"  style="text-align: left;"></p>

        <!-- Translation phase — shown for dict-choice and dict-type after spelling -->
        <div id="dict-trans-phase" hidden>
          <p class="prompt-label" style="margin-top:20px; text-align: left;">Now: what does it mean in English?</p>
          <div class="options" id="dict-trans-options"></div>
          <input id="dict-trans-input" class="type-input" type="text" placeholder="Type the English meaning…"
                 autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                 onkeydown="if(event.key==='Enter') handleCheckNext()" hidden>
          <p class="feedback"       id="dict-trans-feedback" style="text-align: left;"></p>
          <p class="correct-answer" id="dict-trans-correct"  style="text-align: left;"></p>
        </div>
      </div>
    </div>

    <div class="submit-row">
      <button id="dict-skip-back-btn" class="btn btn-ghost"   onclick="handleSkipBack()">Skip</button>
      <button id="dict-check-next-btn" class="btn btn-primary" onclick="handleCheckNext()">Check →</button>
    </div>
  </div>

  <!-- ── QUIZ SCREEN ─────────────────────────────────────────────── -->
  <div id="quiz-screen" hidden>
    <div class="quiz-header">
      <button class="btn btn-ghost btn-sm" onclick="goHome()">← Back</button>
      <span class="progress-text" id="progress-text"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

    <p class="prompt-label" id="prompt-label"></p>
    <p class="prompt-word"  id="prompt-word"></p>

    <div class="options"  id="options"></div>
    <p  class="feedback"  id="feedback"></p>
    <div class="submit-row">
      <button id="quiz-skip-back-btn" class="btn btn-ghost"   onclick="handleSkipBack()">Skip</button>
      <button id="quiz-check-next-btn" class="btn btn-primary" onclick="handleCheckNext()" hidden>Next →</button>
    </div>
  </div>

  <!-- ── SCORE SCREEN ────────────────────────────────────────────── -->
  <div id="score-screen" hidden>
    <div class="score-display">
      <div class="score-number" id="score-number"></div>
      <div class="score-label"  id="score-label"></div>
    </div>
    <p class="review-heading" id="review-heading" hidden>Review these:</p>
    <div class="wrong-list" id="wrong-list"></div>
    <div class="score-actions">
      <button class="btn btn-primary btn-full" id="redo-btn" onclick="redoWrong()" hidden>↩ Redo wrong answers</button>
      <button class="btn btn-ghost   btn-full" onclick="goHome()">← Back to home</button>
    </div>
  </div>

</div>
<script>
  // ── State ────────────────────────────────────────────────────────────
  const db = { allWords: [], sections: {} };
  let direction = 'es-en';
  let quiz = null;

  // ── CSV parser (handles quoted fields with commas) ───────────────────
  function parseCSV(text) {
    const rows = [];
    for (const line of text.trim().split('\n').slice(1)) {
      const cols = [];
      let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      if (cols.length >= 3) rows.push(cols);
    }
    return rows;
  }

  // ── Init ─────────────────────────────────────────────────────────────
  async function init() {
    const text = await fetch('vocabulary_database.csv').then(r => r.text());
    db.allWords = parseCSV(text)
      .map(([s, e, sec, , capitals]) => ({
        spanish: s?.trim(), english: e?.trim(), section: sec?.trim(),
        capitals: capitals?.trim() === 'yes'
      }))
      .filter(w => w.spanish && w.english && w.section);

    for (const w of db.allWords) {
      if (!db.sections[w.section]) db.sections[w.section] = [];
      db.sections[w.section].push(w);
    }
    renderSectionList();
  }

  // ── Home helpers ─────────────────────────────────────────────────────
  function renderSectionList() {
    const el = document.getElementById('section-list');
    el.innerHTML = '';
    for (const [name, words] of Object.entries(db.sections)) {
      const label = document.createElement('label');
      label.className = 'section-item';
      label.innerHTML = `
        <input type="checkbox" name="section" value="${name}" checked>
        <span class="section-name">${name}</span>
        <span class="section-count">${words.length} words</span>`;
      el.appendChild(label);
    }
  }

  function selectAll(on) {
    document.querySelectorAll('input[name=section]').forEach(cb => cb.checked = on);
  }

  function setDirection(d) {
    direction = d;
    document.getElementById('dir-es-en').classList.toggle('active', d === 'es-en');
    document.getElementById('dir-en-es').classList.toggle('active', d === 'en-es');
  }

  function getSelectedWords() {
    const checked = new Set(
      [...document.querySelectorAll('input[name=section]:checked')].map(cb => cb.value)
    );
    return db.allWords.filter(w => checked.has(w.section));
  }

  function showScreen(id) {
    ['home-screen', 'flashcard-screen', 'type-screen', 'dict-screen', 'quiz-screen', 'score-screen'].forEach(s =>
      document.getElementById(s).hidden = (s !== id)
    );
  }

  function goHome() { quiz = null; showScreen('home-screen'); }

  // ── Shuffle ───────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── Start activity ────────────────────────────────────────────────────
  function startActivity(type, wordPool, dir) {
    if (type === 'type') { startTypeAnswer(wordPool, dir); return; }
    if (type === 'dict' || type === 'dict-choice' || type === 'dict-type') { startDictation(wordPool, type); return; }
    const words = wordPool ?? getSelectedWords();
    if (!words.length) { alert('Please select at least one topic.'); return; }
    quiz = {
      type,
      words: shuffle(words),
      direction: dir ?? direction,
      index: 0,
      results: [],
      total: Math.min(10, words.length)
    };
    showScreen('quiz-screen');
    renderQuestion();
  }

  // ── Navigation & Controls ───────────────────────────────────────────
  function updateControls() {
    const res = quiz.results[quiz.index];
    const isAnswered = !!res;
    const isFirst = quiz.index === 0;
    const isLast = quiz.index >= quiz.total - 1;

    let screenPrefix = 'quiz-';
    if (quiz.type === 'type') screenPrefix = 'type-';
    else if (quiz.type.startsWith('dict')) screenPrefix = 'dict-';

    const skipBackBtn = document.getElementById(screenPrefix + 'skip-back-btn');
    const checkNextBtn = document.getElementById(screenPrefix + 'check-next-btn');

    // For combined dictation, it's only "fully finished" if transResult is present
    const isComb = quiz.type === 'dict-choice' || quiz.type === 'dict-type';
    const isFinished = isComb ? (res && !!res.transResult) : isAnswered;

    if (isFinished) {
      skipBackBtn.textContent = '← Back';
      skipBackBtn.disabled = isFirst;
      checkNextBtn.textContent = isLast ? 'Finish ✓' : 'Next →';
      checkNextBtn.hidden = false;
      checkNextBtn.disabled = false;
    } else {
      skipBackBtn.textContent = 'Skip';
      skipBackBtn.disabled = false;
      if (quiz.type === 'type' || quiz.type.startsWith('dict')) {
        checkNextBtn.textContent = 'Check →';
        checkNextBtn.hidden = false;
        // In dict-choice, the second phase has no check button (user clicks options)
        if (isComb && isAnswered && quiz.type === 'dict-choice') {
          checkNextBtn.hidden = true;
        }
      } else {
        checkNextBtn.hidden = true;
      }
    }
  }

  function handleCheckNext() {
    const res = quiz.results[quiz.index];
    const isComb = quiz.type === 'dict-choice' || quiz.type === 'dict-type';
    const isFinished = isComb ? (res && !!res.transResult) : !!res;

    if (!isFinished) {
      if (quiz.type === 'type') submitTypeAnswer();
      else if (quiz.type.startsWith('dict')) {
        if (!res) submitDictAnswer();
        else if (quiz.type === 'dict-type') submitDictTranslation();
      }
    } else {
      nextQuestion();
    }
  }

  function handleSkipBack() {
    const res = quiz.results[quiz.index];
    const isComb = quiz.type === 'dict-choice' || quiz.type === 'dict-type';
    const isFinished = isComb ? (res && !!res.transResult) : !!res;

    if (!isFinished) {
      if (quiz.type === 'type') skipTypeAnswer();
      else if (quiz.type.startsWith('dict')) skipDictAnswer();
      else skipQuestion();
    } else {
      prevQuestion();
    }
  }

  function nextQuestion() {
    quiz.index++;
    if (quiz.index >= quiz.total) renderScore();
    else {
      if (quiz.type === 'mc') renderQuestion();
      else if (quiz.type === 'type') renderTypeQuestion();
      else if (quiz.type.startsWith('dict')) renderDictQuestion();
    }
  }

  function prevQuestion() {
    if (quiz.index > 0) {
      quiz.index--;
      if (quiz.type === 'mc') renderQuestion();
      else if (quiz.type === 'type') renderTypeQuestion();
      else if (quiz.type.startsWith('dict')) renderDictQuestion();
    }
  }

  function skipQuestion() {
    if (quiz.type.startsWith('dict')) {
      skipDictAnswer();
      return;
    }
    const word = quiz.words[quiz.index];
    const isES = quiz.direction === 'es-en';
    const correct = isES ? word.english : word.spanish;
    quiz.results[quiz.index] = { ok: false, score: 0, chosen: '—', correct };
    if (quiz.type === 'mc') renderQuestion();
    else renderTypeQuestion();
  }

  // ── Multiple choice question ──────────────────────────────────────────
  function renderQuestion() {
    const word = quiz.words[quiz.index];
    const isES = quiz.direction === 'es-en';
    const prompt  = isES ? word.spanish  : word.english;
    const correct = isES ? word.english  : word.spanish;

    document.getElementById('progress-text').textContent = `${quiz.index + 1} / ${quiz.total}`;
    document.getElementById('progress-fill').style.width = `${((quiz.index + 1) / quiz.total) * 100}%`;
    document.getElementById('prompt-label').textContent  = isES ? 'What does this mean in English?' : 'How do you say this in Spanish?';
    document.getElementById('prompt-word').textContent   = prompt;

    const res = quiz.results[quiz.index];
    const fb = document.getElementById('feedback');
    fb.textContent = res ? (res.ok ? '¡Correcto! ✓' : `Incorrect — the answer was: ${res.correct}`) : '';
    fb.className = 'feedback' + (res ? (res.ok ? ' correct' : ' incorrect') : '');

    if (!word.options) {
      const pool = shuffle(db.allWords.filter(w => (isES ? w.english : w.spanish) !== correct));
      const numDistractors = Math.min(4, pool.length);
      word.options = shuffle([correct, ...pool.slice(0, numDistractors).map(w => isES ? w.english : w.spanish)]);
    }

    const container = document.getElementById('options');
    container.innerHTML = '';
    for (const opt of word.options) {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      if (res) {
        btn.disabled = true;
        if (opt === correct) btn.classList.add('correct');
        if (opt === res.chosen && !res.ok) btn.classList.add('incorrect');
      }
      btn.textContent = opt;
      btn.onclick = () => checkAnswer(btn, opt, correct, word);
      container.appendChild(btn);
    }
    updateControls();
  }

  function checkAnswer(btn, chosen, correct, word) {
    const ok = chosen === correct;
    quiz.results[quiz.index] = { ok, score: ok ? 1 : 0, chosen, correct };
    renderQuestion();
  }

  // ── Score screen ──────────────────────────────────────────────────────
  function renderScore() {
    showScreen('score-screen');
    const total = quiz.total;
    const score = quiz.results.reduce((acc, r) => acc + (r ? r.score : 0), 0);
    const wrong = quiz.results.filter(r => r && !r.ok);

    const scoreDisplay = Number.isInteger(score) ? score : score.toFixed(1);
    document.getElementById('score-number').textContent = `${scoreDisplay}/${total}`;
    document.getElementById('score-label').textContent  =
      score === total          ? '¡Perfecto! 🎉' :
      score >= total * 0.8     ? '¡Muy bien! Nearly there.' :
      score >= total * 0.5     ? 'Good effort — keep practising!' :
                                 'Don\'t worry, practice makes perfect!';

    const list = document.getElementById('wrong-list');
    list.innerHTML = '';
    const hasWrong = wrong.length > 0;
    document.getElementById('review-heading').hidden = !hasWrong;
    document.getElementById('redo-btn').hidden       = !hasWrong;

    for (const r of wrong) {
      const word = quiz.words[quiz.results.indexOf(r)];
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `
        <span class="es">${word.spanish}</span>
        <span class="en"> = ${word.english}</span>
        <span class="yours">${
          r.spellChosen !== undefined
            ? `Spelling: ${r.spellChosen}${r.transChosen ? ` · Meaning: ${r.transChosen}` : ''}`
            : `You answered: ${r.chosen}`
        }</span>`;
      list.appendChild(div);
    }
  }

  function redoWrong() {
    const wrong = quiz.results.filter(r => r && !r.ok);
    const words = wrong.map(r => quiz.words[quiz.results.indexOf(r)]);
    const dir   = quiz.direction;
    const type  = quiz.type;
    startActivity(type, words, dir);
  }

  // ── Speech synthesis ──────────────────────────────────────────────────
  function speak(text, lang = 'es-ES') {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    speechSynthesis.speak(u);
  }

  // ── Flashcards ────────────────────────────────────────────────────────
  let fc = null;

  function startFlashcards(wordPool, dir) {
    const words = wordPool ?? getSelectedWords();
    if (!words.length) { alert('Please select at least one topic.'); return; }
    fc = { words: shuffle(words), index: 0, direction: dir ?? direction };
    showScreen('flashcard-screen');
    renderCard();
  }

  function renderCard() {
    const word  = fc.words[fc.index];
    const isES  = fc.direction === 'es-en';
    const total = fc.words.length;

    document.getElementById('fc-progress').textContent      = `${fc.index + 1} / ${total}`;
    document.getElementById('fc-progress-fill').style.width = `${((fc.index + 1) / total) * 100}%`;
    document.getElementById('fc-counter').textContent       = `${fc.index + 1} of ${total}`;
    document.getElementById('fc-prev-btn').disabled         = fc.index === 0;
    document.getElementById('fc-next-btn').textContent      = fc.index === total - 1 ? 'Done ✓' : 'Next →';

    document.getElementById('fc-front-label').textContent = isES ? 'Spanish' : 'English';
    document.getElementById('fc-front-word').textContent  = isES ? word.spanish : word.english;
    document.getElementById('fc-back-label').textContent  = isES ? 'English' : 'Spanish';
    document.getElementById('fc-back-word').textContent   = isES ? word.english : word.spanish;

    // Reset flip & hint
    document.getElementById('fc-card').classList.remove('flipped');
    document.getElementById('fc-hint').textContent = 'Tap the card to reveal';
  }

  function flipCard() {
    document.getElementById('fc-card').classList.toggle('flipped');
    document.getElementById('fc-hint').textContent = '';
  }

  function fcSpeak(e) {
    e.stopPropagation(); // don't re-flip the card
    speak(fc.words[fc.index].spanish);
  }

  function fcNav(dir) {
    const next = fc.index + dir;
    if (next < 0) return;
    if (next >= fc.words.length) { goHome(); return; }
    fc.index = next;
    renderCard();
  }

  // ── Grading engine (shared by Type Answer + Dictation) ───────────────
  const ACCENT_MAP = { 'á':'a','é':'e','í':'i','ó':'o','ú':'u','ü':'u','ñ':'n',
                       'Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U','Ü':'U','Ñ':'N' };

  function stripAccents(s) {
    return s.split('').map(c => ACCENT_MAP[c] ?? c).join('');
  }

  function normalise(s) {
    return stripAccents(
      s.toLowerCase().trim()
       .replace(/[‘’‚‛ʼ]/g, "'")
       .replace(/[()]/g, '')
       .replace(/\s+/g, ' ')
    );
  }

  function contentWords(s) {
    return normalise(s).split(' ').filter(w => w.length >= 4);
  }

  // Returns 'correct' | 'nearly' | 'incorrect'
  function grade(typed, correct, requiresCapital = false) {
    const t = typed.trim();
    const normT = normalise(t);
    const normC = normalise(correct);

    if (t === correct) return 'correct';

    // Case-insensitive match: full marks unless this word requires capital letters
    if (t.toLowerCase() === correct.toLowerCase()) return requiresCapital ? 'nearly' : 'correct';

    // Wrong/missing accents or missing spaces → nearly
    if (normT === normC) return 'nearly';
    if (normT.replace(/\s/g, '') === normC.replace(/\s/g, '')) return 'nearly';

    // Partial word overlap (both sides must have ≥1 content word of length ≥4 in common)
    const wordsT = contentWords(t);
    const wordsC = contentWords(correct);
    if (wordsT.length > 0 && wordsC.length > 0) {
      const shared = wordsT.filter(w => wordsC.includes(w));
      if (shared.length > 0) return 'nearly';
    }

    return 'incorrect';
  }

  // ── Type Answer ────────────────────────────────────────────────────────
  function startTypeAnswer(wordPool, dir) {
    const words = wordPool ?? getSelectedWords();
    if (!words.length) { alert('Please select at least one topic.'); return; }
    quiz = {
      type: 'type',
      words: shuffle(words),
      direction: dir ?? direction,
      index: 0,
      results: [],
      total: Math.min(10, words.length)
    };
    showScreen('type-screen');
    renderTypeQuestion();
  }

  function renderTypeQuestion() {
    const word  = quiz.words[quiz.index];
    const isES  = quiz.direction === 'es-en';
    const correct = isES ? word.english : word.spanish;

    document.getElementById('type-progress').textContent      = `${quiz.index + 1} / ${quiz.total}`;
    document.getElementById('type-progress-fill').style.width = `${((quiz.index + 1) / quiz.total) * 100}%`;
    document.getElementById('type-label').textContent         = isES ? 'What does this mean in English?' : 'How do you say this in Spanish?';
    document.getElementById('type-word').textContent          = isES ? word.spanish : word.english;

    const res = quiz.results[quiz.index];
    const fb = document.getElementById('type-feedback');
    const ca = document.getElementById('type-correct');
    const input = document.getElementById('type-input');

    fb.textContent = '';
    fb.className = 'feedback';
    ca.innerHTML = '';
    input.value = res ? res.chosen : '';
    input.disabled = !!res;
    input.className = 'type-input' + (res ? ' ' + res.result : '');

    if (res) {
      if (res.ok) {
        fb.textContent = '¡Correcto! ✓';
        fb.className = 'feedback correct';
      } else if (res.result === 'nearly') {
        fb.textContent = 'Nearly! ½ point';
        fb.className = 'feedback nearly';
        ca.innerHTML = `Correct answer: <strong>${res.correct}</strong>`;
      } else {
        fb.textContent = res.chosen === '—' ? 'Skipped' : 'Incorrect ✗';
        fb.className = 'feedback incorrect';
        ca.innerHTML = `Correct answer: <strong>${res.correct}</strong>`;
      }
    } else {
      input.focus();
    }
    updateControls();
  }

  function submitTypeAnswer() {
    const input   = document.getElementById('type-input');
    const typed   = input.value.trim();
    if (!typed) return;

    const word    = quiz.words[quiz.index];
    const isES    = quiz.direction === 'es-en';
    const correct = isES ? word.english : word.spanish;
    const resType = grade(typed, correct, isES && word.capitals);

    const ok = resType === 'correct';
    const score = ok ? 1 : (resType === 'nearly' ? 0.5 : 0);
    quiz.results[quiz.index] = { ok, score, chosen: typed, correct, result: resType };

    renderTypeQuestion();
  }

  function skipTypeAnswer() {
    const word    = quiz.words[quiz.index];
    const isES    = quiz.direction === 'es-en';
    const correct = isES ? word.english : word.spanish;
    quiz.results[quiz.index] = { ok: false, score: 0, chosen: '—', correct, result: 'incorrect' };
    renderTypeQuestion();
  }

  // ── Dictation ────────────────────────────────────────────────────────
  const VOICE_LABELS = {
    'es-ES':'España','es-MX':'México','es-US':'Estados Unidos',
    'es-AR':'Argentina','es-CO':'Colombia','es-CL':'Chile','es-PE':'Perú'
  };
  let dictVoice = null;

  function pickDictVoice() {
    const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('es'));
    return voices.length ? voices[Math.floor(Math.random() * voices.length)] : null;
  }

  function speakWithVoice(text, voice) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if (voice) { u.voice = voice; u.lang = voice.lang; } else { u.lang = 'es-ES'; }
    speechSynthesis.speak(u);
  }

  function startDictation(wordPool, mode = 'dict') {
    const words = wordPool ?? getSelectedWords();
    if (!words.length) { alert('Please select at least one topic.'); return; }
    quiz = {
      type: mode, words: shuffle(words), direction: 'es-en',
      index: 0, results: [], total: Math.min(10, words.length)
    };
    showScreen('dict-screen');
    renderDictQuestion();
  }

  function renderDictQuestion() {
    const word   = quiz.words[quiz.index];
    const res    = quiz.results[quiz.index];
    const isComb = quiz.type === 'dict-choice' || quiz.type === 'dict-type';

    document.getElementById('dict-progress').textContent      = `${quiz.index + 1} / ${quiz.total}`;
    document.getElementById('dict-progress-fill').style.width = `${((quiz.index + 1) / quiz.total) * 100}%`;

    const fb    = document.getElementById('dict-feedback');
    const ca    = document.getElementById('dict-correct');
    const input = document.getElementById('dict-input');
    const trans = document.getElementById('dict-trans-phase');

    // Reset translation phase
    trans.hidden = true;
    document.getElementById('dict-trans-feedback').textContent = '';
    document.getElementById('dict-trans-feedback').className   = 'feedback';
    document.getElementById('dict-trans-correct').innerHTML    = '';
    document.getElementById('dict-trans-options').innerHTML    = '';

    fb.textContent = ''; fb.className = 'feedback'; ca.innerHTML = '';
    input.className = 'type-input';

    if (!res) {
      // Fresh question — spell phase
      input.value = ''; input.disabled = false;
      dictVoice = pickDictVoice();
      document.getElementById('dict-voice-label').textContent =
        dictVoice ? `voz: ${VOICE_LABELS[dictVoice.lang] || dictVoice.lang}` : 'voz: español';
      speakWithVoice(word.spanish, dictVoice);
      input.focus();
      updateControls();
      return;
    }

    // Spell phase already done — show spelling result
    input.value = res.spellChosen; input.disabled = true;
    input.classList.add(res.spellResult);
    if (res.spellResult === 'correct') {
      fb.textContent = 'Spelling ✓'; fb.className = 'feedback correct';
    } else if (res.spellResult === 'nearly') {
      fb.textContent = 'Spelling nearly ½'; fb.className = 'feedback nearly';
      ca.innerHTML = `Correct spelling: <strong>${res.spellCorrect}</strong>`;
    } else {
      fb.textContent = res.spellChosen === '—' ? 'Skipped' : 'Spelling ✗';
      fb.className = 'feedback incorrect';
      if (res.spellChosen !== '—') ca.innerHTML = `Correct spelling: <strong>${res.spellCorrect}</strong>`;
    }

    if (!isComb) { updateControls(); return; }

    // Combined mode — show translation phase
    trans.hidden = false;
    const ti = document.getElementById('dict-trans-input');
    if (!res.transResult) {
      // Translation not answered yet
      if (quiz.type === 'dict-choice') {
        renderDictTransOptions(word);
        ti.hidden = true;
      } else {
        ti.hidden = false; ti.value = ''; ti.disabled = false; ti.className = 'type-input';
        ti.focus();
      }
    } else {
      // Translation already answered
      if (quiz.type === 'dict-type') {
        ti.hidden = false; ti.value = res.transChosen; ti.disabled = true;
        ti.className = 'type-input ' + res.transResult;
      } else {
        ti.hidden = true;
      }
      renderDictTransResult(res);
    }
    updateControls();
  }

  function renderDictTransOptions(word) {
    const correct = word.english;
    const pool    = shuffle(db.allWords.filter(w => w.english !== correct));
    const options = shuffle([correct, ...pool.slice(0, 4).map(w => w.english)]);
    const container = document.getElementById('dict-trans-options');
    for (const opt of options) {
      const btn = document.createElement('button');
      btn.className = 'option-btn'; btn.textContent = opt;
      btn.onclick = () => checkDictTransMC(opt, correct, word);
      container.appendChild(btn);
    }
  }

  function checkDictTransMC(chosen, correct, word) {
    document.querySelectorAll('#dict-trans-options .option-btn').forEach(b => b.disabled = true);
    const ok = chosen === correct;
    document.querySelectorAll('#dict-trans-options .option-btn').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
      if (b.textContent === chosen && !ok) b.classList.add('incorrect');
    });
    saveDictTransResult(ok ? 'correct' : 'incorrect', chosen, correct, word);
  }

  function submitDictTranslation() {
    const input   = document.getElementById('dict-trans-input');
    const typed   = input.value.trim();
    if (!typed) return;
    const word    = quiz.words[quiz.index];
    const correct = word.english;
    const result  = grade(typed, correct, word.capitals);
    saveDictTransResult(result, typed, correct, word);
  }

  function saveDictTransResult(transResult, transChosen, transCorrect, word) {
    const res = quiz.results[quiz.index];
    const transScore = transResult === 'correct' ? 0.5 : transResult === 'nearly' ? 0.25 : 0;
    res.transResult  = transResult;
    res.transChosen  = transChosen;
    res.transCorrect = transCorrect;
    res.score        = (res.spellScore ?? 0) + transScore;
    res.ok           = res.score === 1;
    renderDictQuestion();
  }

  function renderDictTransResult(res) {
    const fb = document.getElementById('dict-trans-feedback');
    const ca = document.getElementById('dict-trans-correct');
    if (res.transResult === 'correct') {
      fb.textContent = '¡Correcto! ✓'; fb.className = 'feedback correct';
    } else if (res.transResult === 'nearly') {
      fb.textContent = 'Nearly! ¼ point'; fb.className = 'feedback nearly';
      ca.innerHTML = `Correct meaning: <strong>${res.transCorrect}</strong>`;
    } else {
      fb.textContent = 'Incorrect ✗'; fb.className = 'feedback incorrect';
      ca.innerHTML = `Correct meaning: <strong>${res.transCorrect}</strong>`;
    }
  }

  function replayDictation() { speakWithVoice(quiz.words[quiz.index].spanish, dictVoice); }

  function submitDictAnswer() {
    const input = document.getElementById('dict-input');
    const typed = input.value.trim();
    if (!typed) return;
    const word       = quiz.words[quiz.index];
    const correct    = word.spanish;
    const spellResult = grade(typed, correct, false);
    const spellScore  = spellResult === 'correct' ? 0.5 : spellResult === 'nearly' ? 0.25 : 0;
    const isComb      = quiz.type === 'dict-choice' || quiz.type === 'dict-type';
    quiz.results[quiz.index] = {
      spellResult, spellChosen: typed, spellCorrect: correct, spellScore,
      ok: !isComb && spellResult === 'correct',
      score: isComb ? spellScore : (spellResult === 'correct' ? 1 : spellResult === 'nearly' ? 0.5 : 0)
    };
    renderDictQuestion();
  }

  function skipDictAnswer() {
    const word   = quiz.words[quiz.index];
    const isComb = quiz.type === 'dict-choice' || quiz.type === 'dict-type';
    quiz.results[quiz.index] = {
      spellResult: 'incorrect', spellChosen: '—', spellCorrect: word.spanish,
      spellScore: 0, ok: false, score: 0,
      ...(isComb ? { transResult: 'incorrect', transChosen: '—', transCorrect: word.english } : {})
    };
    renderDictQuestion();
  }

  // ── Omakase (stub) ────────────────────────────────────────────────────
  function startOmakase() {
    alert('Omakase mode coming soon! Try other activites for now.');
  }
  // ── Global Listeners ────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      // If quiz is active and we're on a quiz screen, advance
      const onQuizScreen = ['quiz-screen','type-screen','dict-screen'].some(id => !document.getElementById(id).hidden);
      if (quiz && onQuizScreen) {
        e.preventDefault();
        handleCheckNext();
      }
    } else if (e.key === 'Escape') {
      if (quiz) goHome();
    }
  });

  init();
</script>
</body>
