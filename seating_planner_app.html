<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Seating Planner</title>
    
    <!-- Tailwind CSS for Modern Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevent body scroll, handle scroll in canvas */
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Canvas Wrapper - allows grab cursor on background */
        #canvasWrapper {
            cursor: grab;
        }
        #canvasWrapper:active {
            cursor: grabbing;
        }

        /* Canvas Grid Background */
        .canvas-container {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 40px 40px;
            position: relative;
            width: 3000px; /* Large scrollable area */
            height: 2000px;
            transform-origin: 0 0;
        }

        /* Desk Styling */
        .desk {
            position: absolute;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.2s, transform 0.1s;
            user-select: none;
            overflow: hidden;
        }

        .desk:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }

        .desk.teacher-desk {
            width: 180px; /* Made slightly wider */
            height: 80px;
            background: #f1f5f9;
            border: 3px dashed #cbd5e1;
        }

        .desk.student-desk {
            width: 130px; 
            height: 80px;
            border-top: 6px solid var(--class-color, #3b82f6);
        }

        .desk .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .mode-layout .desk:hover .remove-btn {
            opacity: 1;
        }

        /* Drag and Drop Visuals */
        .draggable-student {
            cursor: grab;
        }
        .draggable-student:active {
            cursor: grabbing;
        }
        .drag-over {
            background-color: #dbeafe !important;
            border-color: #2563eb !important;
        }

        /* Mode dependent cursors */
        .mode-layout .desk { cursor: move; }
        .mode-seating .desk { cursor: default; }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
        }
        
        .color-swatch {
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent;
        }
        .color-swatch.active {
            border-color: #0f172a;
            transform: scale(1.1);
        }
        .away-striped {
            background-color: #fef2f2 !important;
            background-image: repeating-linear-gradient(45deg, #fee2e2, #fee2e2 10px, #fef2f2 10px, #fef2f2 20px) !important;
        }
    </style>
</head>
<body class="h-screen w-full flex bg-slate-50 text-slate-800">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 bg-white border-r border-slate-200 flex flex-col z-20 shadow-sm shrink-0">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between cursor-pointer hover:bg-slate-50 transition-colors" onclick="toggleSidebar()" title="Hide Sidebar">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-100 text-indigo-600 rounded-xl">
                    <i data-lucide="layout-dashboard"></i>
                </div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">ClassPlanner</h1>
            </div>
            <i data-lucide="chevron-left" class="w-5 h-5 text-slate-400"></i>
        </div>

        <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-6">
            <!-- Standard Sidebar Panel Wrapper -->
            <div id="standardSidebarContent" class="flex flex-col gap-6">
                <!-- Classes List -->
                <div>
                    <div class="flex items-center justify-between mb-3 text-sm font-semibold text-slate-500 uppercase tracking-wider">
                        <span>Classes</span>
                        <button onclick="openClassModal()" class="hover:text-indigo-600 transition-colors" title="Add Class">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div id="classList" class="space-y-1">
                        <!-- Classes injected here -->
                    </div>
                </div>

                <hr class="border-slate-100">

                <!-- Rooms List (Dependent on active class) -->
                <div id="roomsContainer" class="hidden">
                    <div class="flex items-center justify-between mb-3 text-sm font-semibold text-slate-500 uppercase tracking-wider">
                        <span>Classrooms</span>
                        <button onclick="addRoom()" class="hover:text-indigo-600 transition-colors" title="Add Room">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div id="roomList" class="space-y-1">
                        <!-- Rooms injected here -->
                    </div>
                </div>
            </div>

            <!-- Cold Calling Panel (Shown only in coldcall mode) -->
            <div id="coldCallSidebarPanel" class="hidden flex flex-col gap-4">
                <div class="text-sm font-semibold text-slate-500 uppercase tracking-wider mb-2">Cold Call Setup</div>
                
                <!-- Questions box -->
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-2">Question Bank (1 per line)</label>
                    <textarea id="coldCallQuestions" class="w-full h-32 p-3 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 resize-none font-sans" placeholder="E.g. ¿Cómo te llamas?&#10;¿De dónde eres?&#10;¿Cómo estás?"></textarea>
                </div>

                <!-- Call Setup Modes -->
                <div>
                    <label class="block text-xs font-semibold text-slate-600 uppercase mb-2">Select Student Group</label>
                    <div class="space-y-2">
                        <label class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-100 transition-colors">
                            <input type="radio" name="coldCallMode" value="1" checked class="text-indigo-600 focus:ring-indigo-500">
                            <span class="text-sm font-medium text-slate-700">1 Student (Respond)</span>
                        </label>
                        <label class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-100 transition-colors">
                            <input type="radio" name="coldCallMode" value="2a" class="text-indigo-600 focus:ring-indigo-500">
                            <span class="text-sm font-medium text-slate-700">2 Students (Ask & Respond)</span>
                        </label>
                        <label class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-100 transition-colors">
                            <input type="radio" name="coldCallMode" value="2b" class="text-indigo-600 focus:ring-indigo-500">
                            <span class="text-sm font-medium text-slate-700">2 Students (Read & Respond)</span>
                        </label>
                        <label class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-100 transition-colors">
                            <input type="radio" name="coldCallMode" value="3" class="text-indigo-600 focus:ring-indigo-500">
                            <span class="text-sm font-medium text-slate-700">3 Students (Read, Translate, Respond)</span>
                        </label>
                    </div>
                </div>

                <!-- Run Cold Call Button -->
                <button onclick="triggerColdCall()" class="w-full py-3 px-4 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 flex items-center justify-center gap-2 transition-all shadow-md active:scale-98">
                    <i data-lucide="target" class="w-5 h-5"></i> Call Student(s)
                </button>
            </div>
        </div>

        <!-- Data Management -->
        <div class="p-4 border-t border-slate-100 bg-slate-50 space-y-2">
            <button onclick="exportCSV()" class="w-full py-2 px-3 bg-white border border-slate-200 text-slate-700 rounded-lg hover:bg-slate-100 flex items-center justify-center gap-2 transition-all shadow-sm">
                <i data-lucide="download" class="w-4 h-4"></i> Save Data (CSV)
            </button>
            <label class="w-full py-2 px-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 flex items-center justify-center gap-2 transition-all shadow-sm cursor-pointer">
                <i data-lucide="upload" class="w-4 h-4"></i> Load Data (CSV)
                <input type="file" id="csvFileInput" accept=".csv" class="hidden" onchange="importCSV(event)">
            </label>
            <a href="index.html" class="w-full py-2 px-3 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 flex items-center justify-center gap-2 transition-all shadow-sm">
                <i data-lucide="book-open" class="w-4 h-4"></i> Vocab App
            </a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-slate-100">
        
        <!-- Top Toolbar -->
        <header class="h-16 bg-white border-b border-slate-200 px-6 flex items-center justify-between z-10 shadow-sm shrink-0">
            <!-- Mode Toggle & Sidebar Toggle -->
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="text-slate-400 hover:text-slate-700 transition-colors" title="Toggle Sidebar">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="flex bg-slate-100 p-1 rounded-lg">
                    <button id="btnModeLayout" onclick="setMode('layout')" class="px-4 py-1.5 text-sm font-medium rounded-md transition-all active-mode shadow-sm bg-white text-slate-800">
                        <i data-lucide="move" class="w-4 h-4 inline mr-1"></i> Edit Layout
                    </button>
                    <button id="btnModeSeating" onclick="setMode('seating')" class="px-4 py-1.5 text-sm font-medium rounded-md transition-all text-slate-500 hover:text-slate-700">
                        <i data-lucide="users" class="w-4 h-4 inline mr-1"></i> Assign Seats
                    </button>
                    <button id="btnModeColdCall" onclick="setMode('coldcall')" class="px-4 py-1.5 text-sm font-medium rounded-md transition-all text-slate-500 hover:text-slate-700">
                        <i data-lucide="target" class="w-4 h-4 inline mr-1"></i> Cold Call
                    </button>
                </div>
            </div>

            <!-- Contextual Tools -->
            <div class="flex items-center gap-3">
                <!-- Layout Tools -->
                <div id="layoutTools" class="flex gap-2">
                    <button onclick="addStudentDesk()" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-50 flex items-center gap-2 shadow-sm transition-colors">
                        <i data-lucide="plus-square" class="w-4 h-4"></i> Add Desk
                    </button>
                </div>
                <!-- Seating Tools -->
                <div id="seatingTools" class="flex gap-2 hidden">
                    <button onclick="clearHighlights()" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-50 flex items-center gap-2 shadow-sm transition-colors" title="Reset Student Colors">
                        <i data-lucide="eraser" class="w-4 h-4"></i>
                    </button>
                    <button onclick="openRosterModal()" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-50 flex items-center gap-2 shadow-sm transition-colors">
                        <i data-lucide="list" class="w-4 h-4"></i> Edit Roster
                    </button>
                    <button onclick="randomizeSeating()" class="px-3 py-1.5 bg-indigo-50 border border-indigo-200 text-indigo-700 text-sm font-medium rounded-lg hover:bg-indigo-100 flex items-center gap-2 shadow-sm transition-colors">
                        <i data-lucide="shuffle" class="w-4 h-4"></i> Randomize
                    </button>
                    <button onclick="toggleUnassignedDrawer()" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-700 text-sm font-medium rounded-lg hover:bg-slate-50 flex items-center gap-2 shadow-sm transition-colors relative">
                        <i data-lucide="users-2" class="w-4 h-4"></i> Unassigned
                        <span id="unassignedCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
                    </button>
                </div>
                <a href="index.html" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium rounded-lg flex items-center gap-2 shadow-sm transition-colors" title="Go to Vocabulary App">
                    <i data-lucide="book-open" class="w-4 h-4"></i> Vocab App
                </a>
            </div>
        </header>

        <!-- Cold Call Active HUD Bar -->
        <div id="coldCallHUD" class="bg-indigo-950 text-white px-8 py-6 flex flex-col items-center text-center justify-center border-b border-indigo-900 hidden shrink-0 shadow-lg">
            <div class="w-full max-w-4xl">
                <div class="text-xs uppercase tracking-widest text-indigo-300 font-extrabold mb-1">Pregunta Activa</div>
                <div id="hudQuestionText" class="text-2xl font-black text-white leading-tight">No questions loaded. Enter them in the sidebar.</div>
            </div>
            <div id="hudSelectedStudents" class="flex flex-col gap-3 mt-4 items-center justify-center w-full">
                <!-- Injected Student Roles & Names on second and third line centered -->
            </div>
        </div>

        <!-- Canvas Wrapper (Handles scrolling and panning) -->
        <div id="canvasWrapper" class="flex-1 overflow-auto relative">
            <div id="canvas" class="canvas-container mode-layout">
                <!-- Desks injected here -->
            </div>
        </div>

        <!-- Unassigned Students Drawer (Right Side) -->
        <div id="unassignedDrawer" class="absolute top-16 right-0 bottom-0 w-64 bg-white border-l border-slate-200 shadow-xl transform translate-x-full transition-transform duration-300 z-10 flex flex-col">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-semibold text-slate-800">Unassigned</h3>
                <button onclick="toggleUnassignedDrawer()" class="text-slate-400 hover:text-slate-600">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="unassignedList" class="p-4 flex-1 overflow-y-auto space-y-2 bg-slate-50/50" ondragover="allowDrop(event)" ondrop="dropOnUnassigned(event)">
                <!-- Unassigned student pills -->
            </div>
        </div>
    </main>

    <!-- MODALS -->

    <!-- Class Modal -->
    <div id="classModal" class="fixed inset-0 modal-overlay hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800" id="classModalTitle">Add New Class</h2>
                <button onclick="closeModals()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Class Name</label>
                    <input type="text" id="classNameInput" placeholder="e.g., Year 10 Maths" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Subject Icon</label>
                    <div class="grid grid-cols-6 gap-2" id="iconSelector">
                        <!-- Icons generated by JS -->
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Class Color</label>
                    <div class="flex gap-3" id="colorSelector">
                        <!-- Colors generated by JS -->
                    </div>
                </div>
            </div>
            <div class="p-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button onclick="closeModals()" class="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded-lg font-medium transition-colors">Cancel</button>
                <button onclick="saveClass()" class="px-4 py-2 bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg font-medium transition-colors">Save Class</button>
            </div>
        </div>
    </div>

    <!-- Roster Modal -->
    <div id="rosterModal" class="fixed inset-0 modal-overlay hidden z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col h-[80vh]">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center shrink-0">
                <h2 class="text-xl font-bold text-slate-800">Class Roster</h2>
                <button onclick="closeModals()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 flex-1 flex flex-col gap-2 min-h-0">
                <p class="text-sm text-slate-500">Enter student names below, one per line.</p>
                <textarea id="rosterInput" class="w-full flex-1 border border-slate-300 rounded-lg p-4 focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none font-mono text-sm leading-relaxed" placeholder="Alice Smith&#10;Bob Johnson&#10;Charlie Brown"></textarea>
            </div>
            <div class="p-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 shrink-0">
                <button onclick="closeModals()" class="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded-lg font-medium transition-colors">Cancel</button>
                <button onclick="saveRoster()" class="px-4 py-2 bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg font-medium transition-colors">Save Roster</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONSTANTS & DEFAULTS ---
        const ICONS = ['book', 'calculator', 'laptop', 'flask-conical', 'globe', 'music', 'palette', 'languages', 'award'];
        const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#0ea5e9', '#3b82f6', '#8b5cf6', '#ec4899'];
        
        // Generate a random UUID
        function uuid() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        // --- APP STATE ---
        let state = {
            classes: [],
            activeClassId: null,
            activeRoomId: null,
            mode: 'layout' // 'layout' or 'seating'
        };

        // UI State
        let isDrawerOpen = false;
        let selectedIcon = ICONS[0];
        let selectedColor = COLORS[5]; // Blue
        
        // Drag logic state
        let draggingDesk = null;
        let deskDragOffset = { x: 0, y: 0 };
        
        // Panning logic state
        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        let scrollStart = { left: 0, top: 0 };

        // --- STATE SYNCHRONIZATION ---
        function saveState() {
            localStorage.setItem('seatingPlannerState', JSON.stringify(state));
            
            let vocabClasses = {};
            state.classes.forEach(c => {
                vocabClasses[c.name] = c.students.join('\n');
            });
            localStorage.setItem('teacherClasses', JSON.stringify(vocabClasses));
            
            const activeClass = getActiveClass();
            if (activeClass) {
                localStorage.setItem('teacherCurrentClass', activeClass.name);
            }
        }

        function loadState() {
            let savedStateStr = localStorage.getItem('seatingPlannerState');
            let loadedState = null;
            if (savedStateStr) {
                try {
                    loadedState = JSON.parse(savedStateStr);
                } catch(e) {
                    console.error("Error parsing seating planner state", e);
                }
            }
            
            let vocabClassesStr = localStorage.getItem('teacherClasses');
            let vocabClasses = null;
            if (vocabClassesStr) {
                try {
                    vocabClasses = JSON.parse(vocabClassesStr);
                } catch(e) {
                    console.error("Error parsing vocab classes", e);
                }
            }
            
            let vocabCurrentClass = localStorage.getItem('teacherCurrentClass');

            if (!loadedState && !vocabClasses) {
                const initialClass = createDefaultClass();
                state.classes = [initialClass];
                state.activeClassId = initialClass.id;
                state.activeRoomId = initialClass.rooms[0].id;
                saveState();
                return;
            }

            state.classes = loadedState ? loadedState.classes : [];
            
            if (vocabClasses) {
                const vocabClassNames = Object.keys(vocabClasses);
                
                // Remove classes that aren't in vocabClasses anymore
                state.classes = state.classes.filter(c => vocabClassNames.includes(c.name));
                
                // Update or Add classes from vocabClasses
                vocabClassNames.forEach(className => {
                    const rawNames = vocabClasses[className] || "";
                    const studentsArray = rawNames.split('\n').map(n => n.trim()).filter(n => n.length > 0);
                    
                    const existingClass = state.classes.find(c => c.name === className);
                    if (existingClass) {
                        existingClass.students = studentsArray;
                        const studentSet = new Set(studentsArray);
                        existingClass.rooms.forEach(room => {
                            room.desks.forEach(desk => {
                                if (desk.student && !studentSet.has(desk.student)) {
                                    desk.student = null;
                                }
                            });
                        });
                        if (existingClass.highlightedStudents) {
                            existingClass.highlightedStudents = existingClass.highlightedStudents.filter(s => studentSet.has(s));
                        }
                    } else {
                        const classId = uuid();
                        const roomId = uuid();
                        state.classes.push({
                            id: classId,
                            name: className,
                            icon: ICONS[Math.floor(Math.random() * ICONS.length)],
                            color: COLORS[Math.floor(Math.random() * COLORS.length)],
                            students: studentsArray,
                            highlightedStudents: [],
                            rooms: [
                                {
                                    id: roomId,
                                    name: 'Main Classroom',
                                    desks: generateStandardLayout()
                                }
                            ]
                        });
                    }
                });
            }

            let activeClass = null;
            if (vocabCurrentClass) {
                activeClass = state.classes.find(c => c.name === vocabCurrentClass);
            }
            if (!activeClass && state.classes.length > 0) {
                if (loadedState && loadedState.activeClassId) {
                    activeClass = state.classes.find(c => c.id === loadedState.activeClassId);
                }
                if (!activeClass) {
                    activeClass = state.classes[0];
                }
            }
            
            if (activeClass) {
                state.activeClassId = activeClass.id;
                let activeRoom = null;
                if (loadedState && loadedState.activeRoomId && activeClass.rooms) {
                    activeRoom = activeClass.rooms.find(r => r.id === loadedState.activeRoomId);
                }
                if (!activeRoom && activeClass.rooms && activeClass.rooms.length > 0) {
                    activeRoom = activeClass.rooms[0];
                }
                state.activeRoomId = activeRoom ? activeRoom.id : null;
            } else {
                const initialClass = createDefaultClass();
                state.classes = [initialClass];
                state.activeClassId = initialClass.id;
                state.activeRoomId = initialClass.rooms[0].id;
            }
            
            saveState();
        }

        // --- INITIALIZATION ---
        function init() {
            // Setup modals UI
            setupSelectors();
            
            // Load and sync state
            loadState();

            renderAll();
            centerCanvas();
            
            // Setup Global Drag and Pan Events

        function generateStandardLayout() {
            const desks = [];
            const startX = 850; // Shifted left to center the wider block in the viewport
            const startY = 800;  // Center vertically in 2000px canvas

            const deskWidth = 130; 
            const gapInsidePair = 10;
            const gapBetweenCols = 70;
            const rowGap = 50;
            const deskHeight = 80;

            // Calculate total width of the 4 columns to center the teacher desk
            const totalWidth = 4 * (2 * deskWidth + gapInsidePair) + 3 * gapBetweenCols;

            // Teacher desk (centered at the top, slightly wider now: 180px so shift left by 90)
            desks.push({ 
                id: uuid(), 
                x: startX + (totalWidth / 2) - 90, 
                y: startY, 
                isTeacher: true, 
                student: null 
            });

            // Student desks: 4 columns, 3 rows of pairs. Column 4 gets an extra row (4 rows) to reach 26.
            for (let c = 0; c < 4; c++) {
                let rowsInThisCol = (c === 3) ? 4 : 3;
                
                for (let r = 0; r < rowsInThisCol; r++) {
                    for (let p = 0; p < 2; p++) { // pair of 2 desks
                        let x = startX + c * (2 * deskWidth + gapInsidePair + gapBetweenCols) + p * (deskWidth + gapInsidePair);
                        let y = startY + 150 + r * (deskHeight + rowGap);
                        
                        desks.push({
                            id: uuid(),
                            x: x,
                            y: y,
                            isTeacher: false,
                            student: null
                        });
                    }
                }
            }
            return desks;
        }

        }

        function triggerColdCall() {
            const ac = getActiveClass();
            const room = getActiveRoom();
            if (!ac || !room) {
                alert("Please select a class and classroom first.");
                return;
            }

            // Repurpose highlightedStudents to mean 'Away'
            const awaySet = new Set(ac.highlightedStudents || []);
            
            // Gather all present, assigned students in the classroom
            const presentSeatedStudents = room.desks
                .filter(d => !d.isTeacher && d.student && !awaySet.has(d.student))
                .map(d => d.student);

            if (presentSeatedStudents.length === 0) {
                alert("No present seated students available for cold calling!");
                return;
            }

            // Get selected cold call mode
            const radioMode = document.querySelector('input[name="coldCallMode"]:checked').value;
            let N = 1;
            if (radioMode === '2a' || radioMode === '2b') N = 2;
            else if (radioMode === '3') N = 3;

            if (presentSeatedStudents.length < N) {
                alert(`Not enough present seated students to allocate ${N} roles! Calling ${presentSeatedStudents.length} student(s) instead.`);
                N = presentSeatedStudents.length;
            }

            // Fair-Random Selection Heuristic
            if (!ac.callCounts) ac.callCounts = {};
            
            // Ensure all present students have a callCount entry
            presentSeatedStudents.forEach(student => {
                if (ac.callCounts[student] === undefined) {
                    ac.callCounts[student] = 0;
                }
            });

            // Weighted Roulette Wheel selection to choose N unique students
            const selected = [];
            const pool = [...presentSeatedStudents];

            for (let step = 0; step < N; step++) {
                if (pool.length === 0) break;

                // Calculate weights: probability is 1 / (1.8 ^ callCount)
                const weights = pool.map(student => {
                    const count = ac.callCounts[student] || 0;
                    return 1 / Math.pow(1.8, count);
                });

                const totalWeight = weights.reduce((sum, w) => sum + w, 0);
                let r = Math.random() * totalWeight;
                let selectedIdx = 0;

                for (let i = 0; i < pool.length; i++) {
                    r -= weights[i];
                    if (r <= 0) {
                        selectedIdx = i;
                        break;
                    }
                }

                selected.push(pool[selectedIdx]);
                pool.splice(selectedIdx, 1);
            }

            // Increment call count for chosen students
            selected.forEach(student => {
                ac.callCounts[student] = (ac.callCounts[student] || 0) + 1;
            });

            // Select random question from question bank
            const qInput = document.getElementById('coldCallQuestions').value;
            const questions = qInput.split('\n').map(q => q.trim()).filter(q => q.length > 0);
            let activeQuestion = "No active question. Enter questions in the sidebar.";
            if (questions.length > 0) {
                activeQuestion = questions[Math.floor(Math.random() * questions.length)];
            }
            document.getElementById('hudQuestionText').textContent = activeQuestion;

            // Map selected students to roles & colors
            state.coldCallSelected = [];
            if (radioMode === '1') {
                state.coldCallSelected.push({ student: selected[0], role: 'Respond', color: '#10b981' });
            } else if (radioMode === '2a') {
                state.coldCallSelected.push({ student: selected[0], role: 'Ask', color: '#10b981' });
                state.coldCallSelected.push({ student: selected[1], role: 'Respond', color: '#f59e0b' });
            } else if (radioMode === '2b') {
                state.coldCallSelected.push({ student: selected[0], role: 'Read', color: '#10b981' });
                state.coldCallSelected.push({ student: selected[1], role: 'Respond', color: '#f59e0b' });
            } else if (radioMode === '3') {
                state.coldCallSelected.push({ student: selected[0], role: 'Read', color: '#10b981' });
                state.coldCallSelected.push({ student: selected[1], role: 'Translate', color: '#f59e0b' });
                state.coldCallSelected.push({ student: selected[2], role: 'Respond', color: '#8b5cf6' });
            }

            // Display in HUD
            const hudList = document.getElementById('hudSelectedStudents');
            hudList.innerHTML = '';
            state.coldCallSelected.forEach(sel => {
                const badge = document.createElement('div');
                badge.className = 'flex items-center justify-center gap-3 bg-slate-900 border border-slate-700 px-6 py-2 rounded-xl text-lg font-bold shadow-md w-full max-w-md';
                badge.innerHTML = `
                    <span class="w-3.5 h-3.5 rounded-full" style="background-color: ${sel.color};"></span>
                    <span class="text-slate-400 uppercase tracking-widest text-xs">${sel.role}:</span>
                    <span class="text-white">${sel.student}</span>
                `;
                hudList.appendChild(badge);
            });

            renderCanvas();
            saveState();
        }

        // --- GLOBAL DRAG AND PAN LOGIC ---
        function handleDeskMouseDown(e, deskId) {
            if (state.mode !== 'layout') return;
            if (e.target.closest('button')) return; // ignore delete btn

            const room = getActiveRoom();
            draggingDesk = room.desks.find(d => d.id === deskId);
            
            // Calculate offset within the desk
            const deskEl = document.querySelector(`.desk[data-id="${deskId}"]`);
            const rect = deskEl.getBoundingClientRect();
            
            deskDragOffset = {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
            
            deskEl.style.zIndex = 1000;
            e.stopPropagation(); // prevent panning from starting
        }

        function handleCanvasMouseDown(e) {
            // Only start panning if clicking directly on the canvas background
            if (e.target.id === 'canvas' || e.target.id === 'canvasWrapper') {
                isPanning = true;
                const wrapper = document.getElementById('canvasWrapper');
                panStart = { x: e.clientX, y: e.clientY };
                scrollStart = { left: wrapper.scrollLeft, top: wrapper.scrollTop };
                document.body.style.cursor = 'grabbing'; // Force cursor over whole body during drag
            }
        }

        function handleGlobalMouseMove(e) {
            if (draggingDesk) {
                // We are moving a desk
                const canvasRect = document.getElementById('canvas').getBoundingClientRect();
                
                let newX = e.clientX - canvasRect.left - deskDragOffset.x;
                let newY = e.clientY - canvasRect.top - deskDragOffset.y;

                // Optional snap to grid
                newX = Math.round(newX / 10) * 10;
                newY = Math.round(newY / 10) * 10;

                draggingDesk.x = Math.max(0, newX); // Prevent dragging out top/left
                draggingDesk.y = Math.max(0, newY);

                // Fast DOM update
                const el = document.querySelector(`.desk[data-id="${draggingDesk.id}"]`);
                if(el) {
                    el.style.left = `${draggingDesk.x}px`;
                    el.style.top = `${draggingDesk.y}px`;
                }
            } else if (isPanning) {
                // We are panning the canvas
                const wrapper = document.getElementById('canvasWrapper');
                const dx = e.clientX - panStart.x;
                const dy = e.clientY - panStart.y;
                wrapper.scrollLeft = scrollStart.left - dx;
                wrapper.scrollTop = scrollStart.top - dy;
            }
        }

        function handleGlobalMouseUp(e) {
            if (draggingDesk) {
                const el = document.querySelector(`.desk[data-id="${draggingDesk.id}"]`);
                if(el) el.style.zIndex = '';
                draggingDesk = null;
                saveState();
            }
            if (isPanning) {
                isPanning = false;
                document.body.style.cursor = ''; // Reset cursor
            }
        }

        // --- SEATING / DRAG & DROP LOGIC ---
        function dragStart(e, studentName, sourceId) {
            e.dataTransfer.setData('text/plain', JSON.stringify({
                student: studentName,
                sourceId: sourceId
            }));
            e.dataTransfer.effectAllowed = 'move';
        }

        function allowDrop(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            
            // Visual feedback
            const deskEl = e.target.closest('.desk');
            if (deskEl && !deskEl.classList.contains('teacher-desk')) {
                deskEl.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            const deskEl = e.target.closest('.desk');
            if (deskEl) {
                deskEl.classList.remove('drag-over');
            }
        }

        function dropOnDesk(e, targetDeskId) {
            e.preventDefault();
            const deskEl = e.target.closest('.desk');
            if (deskEl) deskEl.classList.remove('drag-over');

            const dataStr = e.dataTransfer.getData('text/plain');
            if (!dataStr) return;

            try {
                const data = JSON.parse(dataStr);
                const room = getActiveRoom();
                const targetDesk = room.desks.find(d => d.id === targetDeskId);
                
                if (targetDesk.isTeacher) return;

                const currentTargetStudent = targetDesk.student;

                // Moving from another desk
                if (data.sourceId !== 'unassigned') {
                    const sourceDesk = room.desks.find(d => d.id === data.sourceId);
                    if (sourceDesk) {
                        sourceDesk.student = currentTargetStudent; // Swap! (or clear if target was empty)
                    }
                }
                
                targetDesk.student = data.student;
                renderAll();
                saveState();

            } catch (err) { console.error(err); }
        }

        function dropOnUnassigned(e) {
            e.preventDefault();
            const dataStr = e.dataTransfer.getData('text/plain');
            if (!dataStr) return;

            try {
                const data = JSON.parse(dataStr);
                if (data.sourceId !== 'unassigned') {
                    const room = getActiveRoom();
                    const sourceDesk = room.desks.find(d => d.id === data.sourceId);
                    if (sourceDesk) {
                        sourceDesk.student = null;
                        renderAll();
                        saveState();
                    }
                }
            } catch(err) { console.error(err); }
        }

        function toggleHighlight(student) {
            if (state.mode !== 'seating') return;
            const ac = getActiveClass();
            if (!ac) return;
            
            if (!ac.highlightedStudents) ac.highlightedStudents = [];
            
            if (ac.highlightedStudents.includes(student)) {
                ac.highlightedStudents = ac.highlightedStudents.filter(s => s !== student);
            } else {
                ac.highlightedStudents.push(student);
            }
            renderAll();
            saveState();
        }

        function clearHighlights() {
            const ac = getActiveClass();
            if (ac) {
                ac.highlightedStudents = [];
                renderAll();
                saveState();
            }
        }

        function randomizeSeating() {
            const ac = getActiveClass();
            const room = getActiveRoom();
            if(!ac || !room) return;

            // Get pool of students
            let pool = [...ac.students];
            
            // Shuffle Pool (Fisher-Yates)
            for (let i = pool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pool[i], pool[j]] = [pool[j], pool[i]];
            }

            // Get available desks
            const availableDesks = room.desks.filter(d => !d.isTeacher);

            // Clear all
            availableDesks.forEach(d => d.student = null);

            // Assign
            for(let i=0; i<Math.min(pool.length, availableDesks.length); i++) {
                availableDesks[i].student = pool[i];
            }

            renderAll();
            saveState();
        }

        function toggleUnassignedDrawer() {
            isDrawerOpen = !isDrawerOpen;
            const drawer = document.getElementById('unassignedDrawer');
            if (isDrawerOpen) {
                drawer.classList.remove('translate-x-full');
            } else {
                drawer.classList.add('translate-x-full');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }

        // --- MODALS & FORMS ---
        function setupSelectors() {
            const iconSel = document.getElementById('iconSelector');
            iconSel.innerHTML = ''; // Add this to clear previous icons
            ICONS.forEach(icon => {
                const div = document.createElement('div');
                div.className = `p-2 border rounded-lg cursor-pointer flex justify-center items-center hover:bg-slate-50 transition-colors ${selectedIcon === icon ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-slate-200 text-slate-500'}`;
                div.innerHTML = `<i data-lucide="${icon}"></i>`;
                div.onclick = () => {
                    selectedIcon = icon;
                    setupSelectors(); // re-render
                };
                iconSel.appendChild(div);
            });

            const colorSel = document.getElementById('colorSelector');
            colorSel.innerHTML = '';
            COLORS.forEach(color => {
                const div = document.createElement('div');
                div.className = `color-swatch ${selectedColor === color ? 'active' : ''}`;
                div.style.backgroundColor = color;
                div.onclick = () => {
                    selectedColor = color;
                    setupSelectors();
                };
                colorSel.appendChild(div);
            });
            lucide.createIcons();
        }

        function openClassModal() {
            selectedIcon = ICONS[0];
            selectedColor = COLORS[5];
            document.getElementById('classNameInput').value = '';
            
            // Clear and re-render selectors to apply defaults visually
            document.getElementById('iconSelector').innerHTML = '';
            setupSelectors();

            document.getElementById('classModal').classList.remove('hidden');
        }

        function saveClass() {
            const name = document.getElementById('classNameInput').value.trim() || 'New Class';
            const newClass = {
                id: uuid(),
                name: name,
                icon: selectedIcon,
                color: selectedColor,
                students: [],
                highlightedStudents: [],
                rooms: [
                    {
                        id: uuid(),
                        name: 'Main Classroom',
                        desks: generateStandardLayout()
                    }
                ]
            };
            state.classes.push(newClass);
            state.activeClassId = newClass.id;
            state.activeRoomId = newClass.rooms[0].id;
            
            closeModals();
            renderAll();
            centerCanvas();
            saveState();
        }

        function openRosterModal() {
            const ac = getActiveClass();
            if (!ac) return;
            document.getElementById('rosterInput').value = ac.students.join('\n');
            document.getElementById('rosterModal').classList.remove('hidden');
        }

        function saveRoster() {
            const ac = getActiveClass();
            if (!ac) return;
            
            const lines = document.getElementById('rosterInput').value.split('\n');
            const cleanStudents = lines.map(s => s.trim()).filter(s => s.length > 0);
            
            // Update class list
            ac.students = cleanStudents;

            // Remove students from desks if they were deleted from the roster
            const studentSet = new Set(cleanStudents);
            ac.rooms.forEach(room => {
                room.desks.forEach(desk => {
                    if (desk.student && !studentSet.has(desk.student)) {
                        desk.student = null; // Unassign removed student
                    }
                });
            });

            // Clean up highlights
            if (ac.highlightedStudents) {
                ac.highlightedStudents = ac.highlightedStudents.filter(s => studentSet.has(s));
            }

            closeModals();
            renderAll();
            saveState();
        }

        function closeModals() {
            document.getElementById('classModal').classList.add('hidden');
            document.getElementById('rosterModal').classList.add('hidden');
        }


        // --- CSV EXPORT / IMPORT ---
        /*
            CSV Structure (Flat representation of nested state):
            RowType, RefID1, RefID2, RefID3, Data1, Data2, Data3, Data4
            Class, ClassID, , , Name, Color, Icon
            Student, ClassID, , , Name
            Room, ClassID, RoomID, , Name
            Desk, ClassID, RoomID, DeskID, X, Y, IsTeacher, StudentName
        */

        function escapeCSV(str) {
            if (str === null || str === undefined) return '""';
            const s = String(str);
            return `"${s.replace(/"/g, '""')}"`;
        }

        function exportCSV() {
            let rows = [];
            rows.push(["Type", "ID1", "ID2", "ID3", "D1", "D2", "D3", "D4"].map(escapeCSV).join(","));

            state.classes.forEach(c => {
                rows.push(["Class", c.id, "", "", c.name, c.color, c.icon, ""].map(escapeCSV).join(","));
                
                c.students.forEach(s => {
                    rows.push(["Student", c.id, "", "", s, "", "", ""].map(escapeCSV).join(","));
                });

                if (c.highlightedStudents) {
                    c.highlightedStudents.forEach(s => {
                        rows.push(["Highlight", c.id, "", "", s, "", "", ""].map(escapeCSV).join(","));
                    });
                }

                c.rooms.forEach(r => {
                    rows.push(["Room", c.id, r.id, "", r.name, "", "", ""].map(escapeCSV).join(","));
                    
                    r.desks.forEach(d => {
                        rows.push(["Desk", c.id, r.id, d.id, d.x, d.y, d.isTeacher, d.student || ""].map(escapeCSV).join(","));
                    });
                });
            });

            const csvString = rows.join("\n");
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `class_seating_${new Date().toISOString().slice(0,10)}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Simple CSV line parser respecting quotes
        function parseCSVLine(text) {
            const re = /(?:^|,)(?:"([^"]*(?:""[^"]*)*)"|([^,]*))/g;
            let result = [];
            let match;
            while (match = re.exec(text)) {
                if (match[1] !== undefined) {
                    result.push(match[1].replace(/""/g, '"'));
                } else if (match[2] !== undefined) {
                    result.push(match[2]);
                }
            }
            return result;
        }

        function importCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const text = e.target.result;
                    const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
                    
                    if (lines.length < 2) return alert("Invalid CSV file.");

                    let newClassesMap = new Map();

                    for (let i = 1; i < lines.length; i++) {
                        const cols = parseCSVLine(lines[i]);
                        if(cols.length < 5) continue;
                        
                        const type = cols[0];
                        const cId = cols[1];

                        if (type === 'Class') {
                            newClassesMap.set(cId, {
                                id: cId,
                                name: cols[4],
                                color: cols[5],
                                icon: cols[6],
                                students: [],
                                highlightedStudents: [],
                                rooms: []
                            });
                        } else if (type === 'Student') {
                            if (newClassesMap.has(cId)) {
                                newClassesMap.get(cId).students.push(cols[4]);
                            }
                        } else if (type === 'Highlight') {
                            if (newClassesMap.has(cId)) {
                                if (!newClassesMap.get(cId).highlightedStudents) newClassesMap.get(cId).highlightedStudents = [];
                                newClassesMap.get(cId).highlightedStudents.push(cols[4]);
                            }
                        } else if (type === 'Room') {
                            const rId = cols[2];
                            if (newClassesMap.has(cId)) {
                                newClassesMap.get(cId).rooms.push({
                                    id: rId,
                                    name: cols[4],
                                    desks: []
                                });
                            }
                        } else if (type === 'Desk') {
                            const rId = cols[2];
                            const dId = cols[3];
                            if (newClassesMap.has(cId)) {
                                const cls = newClassesMap.get(cId);
                                const room = cls.rooms.find(r => r.id === rId);
                                if (room) {
                                    room.desks.push({
                                        id: dId,
                                        x: parseInt(cols[4], 10),
                                        y: parseInt(cols[5], 10),
                                        isTeacher: cols[6] === 'true',
                                        student: cols[7] || null
                                    });
                                }
                            }
                        }
                    }

                    const loadedClasses = Array.from(newClassesMap.values());
                    if (loadedClasses.length > 0) {
                        state.classes = loadedClasses;
                        state.activeClassId = loadedClasses[0].id;
                        state.activeRoomId = loadedClasses[0].rooms.length > 0 ? loadedClasses[0].rooms[0].id : null;
                        renderAll();
                        saveState();
                        alert("Data loaded successfully!");
                    } else {
                        alert("No valid data found in CSV.");
                    }

                } catch (err) {
                    console.error(err);
                    alert("Error parsing CSV file.");
                }
                
                // reset input so same file can be loaded again if needed
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // Listen for changes from other tabs (like the Vocab App)
        window.addEventListener('storage', (e) => {
            if (e.key === 'teacherClasses' || e.key === 'teacherCurrentClass' || e.key === 'seatingPlannerState') {
                loadState();
                renderAll();
            }
        });

        // Start app
        window.onload = init;

    </script>
